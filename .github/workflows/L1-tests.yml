name: L1-tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_call:
    secrets:
      RDKCM_RDKE:
        required: true
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_TYPE: Debug

jobs:
  L1-tests:
    name: Build and run unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.16.x'
          github-api-token: ''

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: pip install jsonref

      - name: ACK External Trigger
        run: |
           echo "Message: External Trigger Received for L1 Tests"
           echo "Trigger Source: ${{ inputs.caller_source }}"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.16.x'

      - name: Install packages
        run: >
          sudo apt update
          &&
          sudo apt install -y
          autoconf automake libtool pkg-config
          libgtest-dev libgmock-dev
          build-essential g++ cmake
          valgrind lcov clang ninja-build
          libglib2.0-dev libdbus-1-dev
          libdirectfb-dev
          libsqlite3-dev libcurl4-openssl-dev
          libsystemd-dev libboost-all-dev libwebsocketpp-dev
          meson libcunit1 libcunit1-dev curl
          protobuf-compiler-grpc libgrpc-dev libgrpc++-dev

      - name: Install GStreamer
        run: |
           sudo apt update
           sudo apt install -y libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Build trower-base64
        run: |
            if [ ! -d "trower-base64" ]; then
            git clone https://github.com/xmidt-org/trower-base64.git
            fi
            cd trower-base64
            meson setup --warnlevel 3 --werror build
            ninja -C build
            sudo ninja -C build install

      - name: Checkout iarmmgrs
        uses: actions/checkout@v3
        with:
          path: iarmmgrs

      - name: Checkout entservices-testframework
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/entservices-testframework
          path: entservices-testframework
          ref: feature/RDKEMW-14961
          token: ${{ secrets.RDKCM_RDKE }}
    
      - name: Checkout rdk-halif-device_settings
        uses: actions/checkout@v3
        with:
          repository: rdkcentral/rdk-halif-device_settings
          path: rdk-halif-device_settings

      - name: Checkout googletest
        uses: actions/checkout@v3
        with:
          repository: google/googletest
          path: googletest
          ref: v1.15.0

      - name: Build googletest
        run: |
          cmake -S "$GITHUB_WORKSPACE/googletest" \
            -B build/googletest \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr" \
            -DBUILD_GMOCK=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build/googletest -j$(nproc)
          cmake --install build/googletest

      - name: Generate external headers
        # Empty headers to mute errors
        run: >
          cd "$GITHUB_WORKSPACE/entservices-testframework/Tests/"
          &&
          mkdir -p
          headers
          headers/audiocapturemgr
          headers/rdk/ds
          headers/rdk/iarmbus
          headers/rdk/halif/
          headers/rdk/halif/deepsleep-manager
          headers/ccec/drivers
          headers/network
          headers/proc
          &&
          cd headers
          &&
          touch
          audiocapturemgr/audiocapturemgr_iarm.h
          ccec/drivers/CecIARMBusMgr.h
          rdk/ds/audioOutputPort.hpp
          rdk/ds/compositeIn.hpp
          rdk/ds/dsDisplay.h
          rdk/ds/dsError.h
          rdk/ds/dsMgr.h
          rdk/ds/dsTypes.h
          rdk/ds/dsUtl.h
          rdk/ds/exception.hpp
          rdk/ds/hdmiIn.hpp
          rdk/ds/host.hpp
          rdk/ds/list.hpp
          rdk/ds/manager.hpp
          rdk/ds/sleepMode.hpp
          rdk/ds/videoDevice.hpp
          rdk/ds/videoOutputPort.hpp
          rdk/ds/videoOutputPortConfig.hpp
          rdk/ds/videoOutputPortType.hpp
          rdk/ds/videoResolution.hpp
          rdk/ds/frontPanelIndicator.hpp
          rdk/ds/frontPanelConfig.hpp
          rdk/ds/frontPanelTextDisplay.hpp
          rdk/ds/audioOutputPortType.hpp
          rdk/ds/audioOutputPortConfig.hpp
          rdk/ds/pixelResolution.hpp
          rdk/iarmbus/libIARM.h
          rdk/iarmbus/libIBus.h
          rdk/iarmbus/libIBusDaemon.h
          rdk/halif/deepsleep-manager/deepSleepMgr.h
          network/wifiSrvMgrIarmIf.h
          network/netsrvmgrIarm.h
          edid-parser.hpp
          libudev.h
          rfcapi.h
          rbus.h
          drm.h
          drm_mode.h
          motionDetector.h
          telemetry_busmessage_sender.h
          maintenanceMGR.h
          pkg.h
          edid-parser.hpp
          secure_wrapper.h
          wpa_ctrl.h
          proc/readproc.h
          systemaudioplatform.h
          gdialservice.h
          gdialservicecommon.h
          &&
          cp -r /usr/include/gstreamer-1.0/gst /usr/include/glib-2.0/* /usr/lib/x86_64-linux-gnu/glib-2.0/include/* /usr/local/include/trower-base64/base64.h /usr/include/libdrm/drm.h /usr/include/libdrm/drm_mode.h /usr/include/xf86drm.h .

        
      - name: Build mocks
        run: >
          cmake
          -S "$GITHUB_WORKSPACE/entservices-testframework/Tests/mocks"
          -B build/mocks
          -DBUILD_SHARED_LIBS=ON
          -DRDK_SERVICES_L1_TEST=ON
          -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}"
          -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/install/usr"
          -DCMAKE_MODULE_PATH="$GITHUB_WORKSPACE/install/tools/cmake"
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_CXX_FLAGS="
          -fprofile-arcs
          -ftest-coverage
          -DEXCEPTIONS_ENABLE=ON
          -DRDK_SERVICES_L1_TEST
          -I$GITHUB_WORKSPACE/entservices-testframework/Tests/headers/rdk/ds
          -I$GITHUB_WORKSPACE/entservices-testframework/Tests/headers/rdk/iarmbus
          -I$GITHUB_WORKSPACE/entservices-deviceanddisplay/helpers
          -I$GITHUB_WORKSPACE/install/usr/include
          -I ./usr/include/libdrm
          -include $GITHUB_WORKSPACE/entservices-testframework/Tests/mocks/devicesettings.h
          -include $GITHUB_WORKSPACE/entservices-testframework/Tests/mocks/Telemetry.h
          --coverage
          -Wall -Wno-unused-result -Wno-deprecated-declarations -Wno-error=format=
          -Wl,-wrap,syslog -Wl,-wrap,v_secure_system -Wl,-wrap,v_secure_popen -Wl,-wrap,v_secure_pclose -Wl,-wrap,unlink -Wl,-wrap,v_secure_system -Wl,-wrap,setmntent -Wl,-wrap,getmntent
          -DENABLE_TELEMETRY_LOGGING
          -DUSE_IARMBUS
          -DENABLE_SYSTEM_GET_STORE_DEMO_LINK
          -DENABLE_DEEP_SLEEP
          -DENABLE_SET_WAKEUP_SRC_CONFIG
          -DENABLE_THERMAL_PROTECTION
          -DUSE_DRM_SCREENCAPTURE
          -DHAS_API_SYSTEM
          -DHAS_API_POWERSTATE
          -DHAS_RBUS
          -D_DRM_MODE_H
          -DENABLE_DEVICE_MANUFACTURER_INFO"
          -D_DRM_MODE_H=ON
          &&
          cmake --build build/mocks -j8
          &&
          cmake --install build/mocks


      - name: Build iarmmgrs L1 tests
        run: |
          cd "$GITHUB_WORKSPACE/iarmmgrs"
          autoreconf -if

          # Compiler / linker flags for coverage instrumentation
          export CFLAGS="-fprofile-arcs -ftest-coverage -g -O0"
          export CXXFLAGS="-fprofile-arcs -ftest-coverage -g -O0"
          export LDFLAGS="--coverage"

          # Tell pkg-config / the build where to find googletest
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/install/usr/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/install/usr/include"
          export LIBRARY_PATH="$GITHUB_WORKSPACE/install/usr/lib:${LIBRARY_PATH:-}"

          ./configure --enable-l1tests \
            TESTFRAMEWORK_DIR="$GITHUB_WORKSPACE/entservices-testframework" \
            DS_IF_DIR="$GITHUB_WORKSPACE/rdk-halif-device_settings" \
            DS_DIR="$GITHUB_WORKSPACE/devicesettings"
          make -C tests/L1Tests

      - name: Run unit tests without valgrind 
        run: |
          cd "$GITHUB_WORKSPACE/iarmmgrs/tests/L1Tests"
          ./run_L1Tests --gtest_output="json:$GITHUB_WORKSPACE/iarmmgrsL1TestResults.json"
          cp "$GITHUB_WORKSPACE/iarmmgrsL1TestResults.json" \
             "$GITHUB_WORKSPACE/iarmmgrsL1TestResultsWithoutValgrind.json"

      - name: Run unit tests with valgrind
        if: ${{ !env.ACT }}
        run: |
          cd "$GITHUB_WORKSPACE/iarmmgrs/tests/L1Tests"
          valgrind \
            --tool=memcheck \
            --log-file="$GITHUB_WORKSPACE/valgrind_log" \
            --leak-check=yes \
            --show-reachable=yes \
            --track-fds=yes \
            --fair-sched=try \
            ./run_L1Tests --gtest_output="json:$GITHUB_WORKSPACE/iarmmgrsL1TestResultsWithValgrind.json"

      - name: Generate coverage
        if: ${{ !env.ACT }}
        run: |
          lcov -c \
            -o coverage.info \
            -d "$GITHUB_WORKSPACE/iarmmgrs"

          lcov -r coverage.info \
            '/usr/include/*' \
            '*/install/usr/include/*' \
            '*/googletest/*' \
            '*/entservices-testframework/*' \
            '*/tests/*' \
            '*/mocks/*' \
            '*/stubs/*' \
            -o filtered_coverage.info

          genhtml \
            -o coverage \
            -t "iarmmgrs L1 coverage" \
            filtered_coverage.info

      - name: Upload artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-L1-iarmmgrs
          path: |
            coverage/
            valgrind_log
            iarmmgrsL1TestResultsWithoutValgrind.json
            iarmmgrsL1TestResultsWithValgrind.json
          if-no-files-found: warn
